<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Spotify Tracker by MattJAshworth</title>

    <style>
    .d-block {
        display: block;
    }
    </style>
</head>
<body>

    h2>Spotify Play Tracker by MattJAshworth</h2>
<p>Your access code is below:</p>
<p id="authCodeID"></p>

    <script>
    var url_string = window.location.href
    var url = new URL(url_string);
    var authCode = url.searchParams.get("code");
    document.getElementById('authCodeID').value = authCode
    </script>
</body>
</html>
