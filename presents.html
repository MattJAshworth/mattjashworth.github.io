<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>MJA PRESENTS</title>
  <link rel='stylesheet' href='https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css'><link rel="stylesheet" href="./style.css">

</head>
<body>

<article class="screen">
  <input type="checkbox" value="None" id="magicButton" name="check" />
  <label class="main" onClick="ShowHideProgress()" for="magicButton"></label>

  <div class="coverImage"></div>
	<div class="container">
  <div class="progress" id="progress"></div>
	</div>
  <div class="bodyPlayer"></div>

  <table class="list">
    <tr class="song" onClick="playParkLife()">
      <td class="nr">
        <h5>1<h5></td>
						<td class="title"><h6>London Calling<h6></td>
						<td class="length"><h5>03:21<h5></td>
					</tr>
				
					<tr class="song" onClick="playPryda()">
						<td class="nr"><h5>2<h5></td>
						<td class="title"><h6>Liam Aidan - Let's Make It<h6></td>
						<td class="length"><h5>03:08<h5></td>
					</tr>
				
				
				
				<div class="shadow"></div>
				
				<div class="bar"></div>
				
				<div class="info">
				<center>
					<h4 id="trackTitle">London Calling</h4>
					<h3>MJA</h3>
					</center>
				</div>
<audio preload="auto" id="audio" controls>
  <source src="londoncalling.mp3">
	</audio>
				<table class="player">
					<td><input type="checkbox" id="backward"/><label class="backward" onclick="playPrevious()" for="backward"></label></td>
					<td><input type="checkbox" id="play" title="Play" onclick="togglePlayPause()"/><label class="play" for="play"></label></td>
					<td><input type="checkbox" id="forward"/><label class="forward" onClick="nextSong()" for="forward"></label></td>
				</table>
				
	
				<div id="trackTitle2" class="current"><h2>MJA 2020</h2></div>
				
			
		</article>
<!-- partial -->
  <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script><script  src="./script.js"></script>

</body>
</html>
