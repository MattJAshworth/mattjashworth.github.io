<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="manifest" href="favicons/site.webmanifest">
    <link rel="mask-icon" href="favicons/safari-pinned-tab.svg" color="#5bbad5">
    <link rel="shortcut icon" href="favicons/favicon.ico">
    <title>Matt Ashworth - Android Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@0.330.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="transition-colors duration-300">
    <div id="app" class="h-screen w-full flex flex-col overflow-hidden relative">
        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 overflow-y-auto overflow-x-hidden scroll-smooth h-full">
            <div id="loading" class="h-full w-full flex items-center justify-center">
                <div class="flex flex-col items-center gap-4">
                    <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-gray-500 font-medium">Loading content...</p>
                </div>
            </div>
        </main>

        <!-- Fullscreen Image Modal -->
        <div id="image-modal" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md hidden items-center justify-center p-4 cursor-pointer" onclick="closeModal()">
            <button class="absolute top-6 right-6 text-white/70 hover:text-white p-2 z-[110]">
                <i data-lucide="x" class="w-8 h-8"></i>
            </button>
            <img id="modal-img" src="" alt="Expanded" class="max-w-full max-h-[85vh] rounded-2xl shadow-2xl object-contain">
        </div>

        <!-- Floating Island Navigation -->
        <div id="nav-container" class="fixed bottom-6 left-0 right-0 z-50 hidden justify-center px-2 pointer-events-none">
            <nav id="bottom-nav" class="w-full max-w-lg bg-white/90 dark:bg-gray-800/90 backdrop-blur-lg border border-gray-200/50 dark:border-white/10 rounded-3xl shadow-2xl pointer-events-auto h-20 px-2 flex justify-between items-center transition-colors duration-300">
                <!-- Nav items injected here -->
            </nav>
        </div>
    </div>

    <script>
        // --- GLOBAL STATE ---
        let portfolioData = null;
        let state = {
            activeTab: 'home',
            pageContent: null,
            selectedApp: null,
            showTerms: false,
            isDarkMode: localStorage.getItem('app_theme') === 'dark'
        };

        // --- DOM ELEMENTS ---
        const mainContent = document.getElementById('main-content');
        const bottomNav = document.getElementById('bottom-nav');
        const navContainer = document.getElementById('nav-container');
        const imageModal = document.getElementById('image-modal');
        const modalImg = document.getElementById('modal-img');

        // --- INITIALIZATION ---
        async function init() {
            try {
                // Fetch the external JSON file
                const response = await fetch('./data.json');
                if (!response.ok) throw new Error("Could not load data.json");
                portfolioData = await response.json();

                const queryString = window.location.search;
                const urlParams = new URLSearchParams(queryString);

                if (urlParams.has('privacy')) {
                    openTerms();
                }

                const keys = Array.from(urlParams.keys());

                if (keys.length > 0) {
                    Object.values(portfolioData.pages).forEach(page => {
                        const foundProject = (page.sections || []).find(section => {
                            if (section.type === 'app_card' || section.type === 'card') {
                                const projectTitle = section.title.toLowerCase().replace(/\s+/g, '-');
                                const projectTitleNoDashes = section.title.toLowerCase().replace(/\s+/g, '');
                
            
                                return keys.includes(projectTitle) || keys.includes(projectTitleNoDashes);
                            }
                            return false;
                        });

                        if (foundProject) {
                            if (foundProject.id == 'app-lunar' || foundProject.id == 'app-solar') {
                                state.activeTab = 'work';
                            } else {
                                state.activeTab = 'apps';
                            }
                            state.selectedApp = foundProject;
                        }
                    });
                }

                // Set initial content
                state.pageContent = portfolioData.pages[state.activeTab];
                
                // Show nav and render
                navContainer.classList.remove('hidden');
                navContainer.classList.add('flex');
                updateTheme();
                render();
            } catch (err) {
                mainContent.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center p-8 text-center">
                        <i data-lucide="alert-triangle" class="w-12 h-12 text-red-500 mb-4"></i>
                        <h2 class="text-xl font-bold">Failed to load data</h2>
                        <p class="text-gray-500 mt-2">The API failed or returned an invalid result.</p>
                        <code class="mt-4 bg-gray-100 p-2 rounded text-xs text-gray-700">${err.message}</code>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        // --- UTILITIES ---
        function updateTheme() {
            if (state.isDarkMode) {
                document.documentElement.classList.add('dark');
                document.body.classList.add('bg-gray-900', 'text-white');
                document.body.classList.remove('bg-gray-50', 'text-gray-900');
            } else {
                document.documentElement.classList.remove('dark');
                document.body.classList.add('bg-gray-50', 'text-gray-900');
                document.body.classList.remove('bg-gray-900', 'text-white');
            }
            localStorage.setItem('app_theme', state.isDarkMode ? 'dark' : 'light');
        }

        window.toggleDarkMode = () => {
            state.isDarkMode = !state.isDarkMode;
            updateTheme();
            render();
        };

        window.navigateTo = (tabId) => {
            state.activeTab = tabId;
            state.selectedApp = null;
            state.showTerms = false;
            state.pageContent = portfolioData.pages[tabId];
            render();
        };

        window.openApp = (sectionJson) => {
            state.selectedApp = JSON.parse(decodeURIComponent(sectionJson));
            render();
        };

        window.goBack = () => {
            state.selectedApp = null;
            state.showTerms = false;
            history.pushState(null, "", location.href.split("?")[0]);
            render();
        };

        window.openTerms = () => {
            state.showTerms = true;
            render();
        };

        window.zoomImage = (url) => {
            modalImg.src = url;
            imageModal.classList.remove('hidden');
            imageModal.classList.add('flex');
        };

        window.closeModal = () => {
            imageModal.classList.add('hidden');
            imageModal.classList.remove('flex');
        };

        // --- RENDERING LOGIC ---
        function getIconHtml(name, size = 24, className = "") {
            if (!name) return `<i data-lucide="info" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;

            let trimmedName = name.trim();

            // 1. Handle Specific Asset Swap (googleplay)
            if (trimmedName === "googleplay") {
                // Determine if we need the white version:
                // Either the parent requested 'text-white' (Primary Button) OR we are in Dark Mode
                const needsWhite = className.includes('text-white') || state.isDarkMode;
                trimmedName = needsWhite ? "assets/googleplay-white.svg" : "assets/googleplay.svg";
            }

            // 2. Detect Raw SVG
            if (trimmedName.startsWith('<svg')) {
                return `<div class="custom-svg-container ${className}" style="width: ${size}px; height: ${size}px;">${trimmedName}</div>`;
            }

            // 3. Detect Image URL or File Path
            const isUrlOrPath = trimmedName.startsWith('http') || 
                               trimmedName.startsWith('/') || 
                               trimmedName.includes('.') || 
                               trimmedName.includes('/');

            if (isUrlOrPath) {
                return `<img src="${trimmedName}" class="object-cover rounded-lg ${className}" style="width: ${size}px; height: ${size}px;" />`;
            }

            // 4. Fallback to Lucide
            return `<i data-lucide="${trimmedName}" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;
        }

        function renderSection(section) {
            const cardBg = "bg-white dark:bg-slate-900 border-gray-100 dark:border-slate-800 p-4 rounded-xl shadow-lg dark:shadow-none border transition-all active:scale-95 cursor-pointer";
            const subText = "text-gray-500 dark:text-gray-400";

            switch (section.type) {
                case 'profile_header':
                    const logo = state.isDarkMode ? section.imageDark : section.imageLight;
                    return `
                        <div class="flex flex-col items-center justify-center text-center py-4">
                            <div class="w-full max-w-md px-2 mb-2">
                                <img src="${logo}" class="w-full h-auto object-contain" />
                            </div>
                            <div class="space-y-1 mb-5">
                                <h2 class="text-xl font-medium tracking-wide">${section.tagline}</h2>
                                <div class="h-1 w-12 mx-auto rounded-full bg-blue-500/50"></div>
                            </div>
                            <div class="flex gap-6">
                                ${(section.socials || []).map(s => `
                                    <a href="${s.url}" target="_blank" rel="noopener noreferrer" class="p-3 rounded-full bg-white dark:bg-gray-800 border border-gray-100 dark:border-white/10 shadow-sm hover:shadow-md transition-all">
                                        ${getIconHtml(s.type, 20)}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    `;

                case 'timeline':
                    return `
                        <div class="relative space-y-8 py-2">
                            <div class="absolute left-5 top-0 bottom-0 w-0.5 bg-gray-200 dark:bg-gray-700"></div>
                            ${(section.items || []).map(item => `
                                <div class="relative pl-12">
                                    <div class="absolute left-3 top-1.5 w-4 h-4 rounded-full border-2 bg-white dark:bg-gray-900 border-emerald-500 z-10"></div>
                                    <div class="space-y-1">
                                        <div class="flex flex-wrap items-center justify-between gap-2">
                                            <h4 class="font-bold">${item.title}</h4>
                                            <span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400">${item.date}</span>
                                        </div>
                                        <p class="text-sm font-medium text-blue-600 dark:text-blue-400">${item.company}</p>
                                        <p class="text-sm ${subText} leading-relaxed mt-1">${item.desc}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;

                case 'app_card':
                case 'card':
                    const encoded = encodeURIComponent(JSON.stringify(section));
                    return `
                        <div onclick="${section.type === 'app_card' ? `openApp('${encoded}')` : ''}" class="${cardBg} p-4 rounded-xl shadow-sm transition-all active:scale-95 cursor-pointer flex gap-4 items-center">
                            <div class="w-12 h-12 rounded-lg flex items-center justify-center flex-shrink-0 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 overflow-hidden">
                                ${getIconHtml(section.icon || 'star', section.icon?.startsWith('http') ? 48 : 48)}
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold">${section.title}</h3>
                                <p class="text-sm ${subText} leading-relaxed">${section.desc}</p>
                            </div>
                            <div class="${subText}"><i data-lucide="chevron-right" class="w-5 h-5"></i></div>
                        </div>
                    `;

                case 'skill_card':
                    const encoded2 = encodeURIComponent(JSON.stringify(section));
                    return `
                        <div onclick="${section.type === 'app_card' ? `openApp('${encoded2}')` : ''}" class="${cardBg} p-4 rounded-xl shadow-sm transition-all active:scale-95 cursor-pointer flex gap-4 items-center">
                            <div class="w-12 h-12 rounded-lg flex items-center justify-center flex-shrink-0 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 overflow-hidden">
                                ${getIconHtml(section.icon || 'star', section.icon?.startsWith('http') ? 48 : 48)}
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold">${section.title}</h3>
                                <p class="text-sm ${subText} leading-relaxed">${section.desc}</p>
                            </div>
                        </div>
                    `;

                case 'toggle_section':
                    return `
                        <div class="${cardBg} p-4 rounded-xl flex justify-between items-center" onclick="toggleDarkMode()">
                            <div class="flex items-center gap-3">
                                <div class="p-2 rounded-lg bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400">
                                    ${getIconHtml(state.isDarkMode ? 'moon' : 'sun', 20)}
                                </div>
                                <span class="font-medium">${section.label}</span>
                            </div>
                            <button onclick="toggleDarkMode()" class="relative inline-flex h-7 w-12 items-center rounded-full transition-colors ${state.isDarkMode ? 'bg-blue-600' : 'bg-gray-300'}">
                                <span class="inline-block h-5 w-5 transform rounded-full bg-white transition-transform ${state.isDarkMode ? 'translate-x-6' : 'translate-x-1'}"></span>
                            </button>
                        </div>
                    `;

                case 'list':
                    return `
                        <div class="${cardBg} rounded-xl overflow-hidden">
                            <ul class="divide-y divide-gray-100 dark:divide-gray-700">
                                ${(section.items || []).map(item => {
                                    const label = item.label || item;
                                    const clickAction = item.id === 'terms' ? 'openTerms()' : (item.url && item.url !== '#' ? `window.open('${item.url}', '_blank')` : '');
                                    return `
                                        <li onclick="${clickAction}" class="py-4 px-4 flex justify-between items-center hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer group transition-colors">
                                            <div class="flex items-center gap-3">
                                                <div class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-300 group-hover:text-blue-500 transition-colors">
                                                    ${getIconHtml(item.icon || 'external-link', 18)}
                                                </div>
                                                <span class="font-medium">${label}</span>
                                            </div>
                                            <i data-lucide="chevron-right" class="w-4 h-4 ${subText} group-hover:text-blue-500"></i>
                                        </li>
                                    `;
                                }).join('')}
                            </ul>
                        </div>
                    `;

                case 'tags':
                    return `
                        <div class="flex flex-wrap gap-2">
                            ${(section.items || []).map(tag => `
                                <span class="px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider bg-blue-50 dark:bg-gray-700 text-blue-700 dark:text-blue-400">${tag}</span>
                            `).join('')}
                        </div>
                    `;

                case 'section_header':
                    return `<h3 class="text-sm font-bold mt-6 mb-2 uppercase tracking-widest ${subText}">${section.title}</h3>`;

                case 'text':
                    return `<p class="text-center py-4 text-xs font-medium ${subText}">${section.text}</p>`;

                default: return '';
            }
        }

        function render() {
            if (!portfolioData) return;

            // Render Nav
            bottomNav.innerHTML = portfolioData.navigation.map(item => {
                const isActive = state.activeTab === item.id;
                return `
                    <button onclick="navigateTo('${item.id}')" class="flex flex-col items-center justify-center w-full h-full relative group">
                        ${isActive ? '<span class="absolute top-1 w-1 h-1 bg-blue-500 rounded-full"></span>' : ''}
                        <div class="p-1.5 rounded-xl transition-all duration-300 mb-0.5 ${isActive ? 'text-blue-500 transform -translate-y-0.5' : 'text-gray-400 dark:text-gray-500 group-hover:text-gray-600 dark:group-hover:text-gray-300'}">
                            ${getIconHtml(item.icon, 22)}
                        </div>
                        <span class="text-[10px] font-medium tracking-wide transition-colors ${isActive ? 'text-blue-500' : 'text-gray-400 dark:text-gray-500'}">${item.label}</span>
                    </button>
                `;
            }).join('');

            // Render Body
            if (state.showTerms) {
                const content = portfolioData.pages.privacy || { title: "Privacy Policy", text: "" };
                mainContent.innerHTML = `
                    <div class="p-4 pb-32 space-y-6 slide-in">
                        <header class="flex items-center gap-4 mb-6">
                            <button onclick="goBack()" class="p-2 rounded-full bg-white dark:bg-gray-800 border border-gray-100 dark:border-white/10 shadow-sm"><i data-lucide="arrow-left" class="w-5 h-5 text-black dark:text-white"></i></button>
                            <h1 class="text-xl font-bold text-gray-900 dark:text-white">${content.title}</h1>
                        </header>
                        <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl border border-gray-100 dark:border-white/10 shadow-sm space-y-4">
                            <p class="text-left text-sm font-medium text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed">${content.text.join('<br><br>')}</p>
                        </div>
                    </div>
                `;
            } else if (state.selectedApp) {
                const app = state.selectedApp;
                mainContent.innerHTML = `
                    <div class="p-4 pb-32 space-y-6 slide-in">
                        <header class="flex items-center gap-4 mb-6">
                            <button onclick="goBack()" class="p-2 rounded-full bg-gray-100 dark:bg-gray-800"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                            <h1 class="text-2xl font-bold">Project Details</h1>
                        </header>
                        <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl border border-gray-200/50 dark:border-white/10 shadow-sm space-y-6">
                            <div class="flex gap-4 items-center">
                                <div class="w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0 bg-blue-50 dark:bg-blue-900/20 overflow-hidden">
                                    ${getIconHtml(app.icon, app.icon?.startsWith('http') ? 64 : 64)}
                                </div>
                                <div>
                                    <h2 class="text-2xl font-bold">${app.title}</h2>
                                    <p class="text-gray-500 dark:text-gray-400">Android Development</p>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <h3 class="font-bold uppercase text-xs tracking-widest text-gray-400">About</h3>
                                <p class="leading-relaxed whitespace-pre-wrap">${app.details?.about || "N/A"}</p>
                            </div>
                            <div class="space-y-2">
                                <h3 class="font-bold uppercase text-xs tracking-widest text-gray-400">Tech Stack</h3>
                                <div class="flex flex-wrap gap-2">
                                    ${(app.details?.stack || []).map(t => `<span class="px-3 py-1 rounded-lg text-xs font-semibold bg-blue-50 dark:bg-gray-700 text-blue-700 dark:text-blue-400">${t}</span>`).join('')}
                                </div>
                            </div>
                            <div class="space-y-2">
                                <h3 class="font-bold uppercase text-xs tracking-widest text-gray-400">Screenshots</h3>
                                <div class="flex gap-3 overflow-x-auto pb-2 -mx-2 px-2 scrollbar-hide">
                                    ${(app.details?.screenshots || []).map(url => `
                                        <div onclick="zoomImage('${url}')" class="w-32 h-64 rounded-xl flex-shrink-0 border dark:border-gray-700 overflow-hidden cursor-pointer hover:opacity-90 transition-all">
                                            <img src="${url}" class="w-full h-full object-cover" />
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="grid grid-cols-1 gap-3 pt-4">
                                ${(app.details?.links || []).map((l, i) => `
                                    <a href="${l.url}" target="_blank" class="flex items-center justify-center gap-2 py-4 rounded-2xl font-bold transition-all ${i === 0 ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white'}">
                                        ${getIconHtml(l.icon, 20)} ${l.label}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.pageContent) {
                const hero = state.pageContent.heroImage;
                let heroHtml = '';

                if (hero) {
                    if (typeof hero === 'object') {
                        heroHtml = `
                            <div class="h-48 md:h-64 rounded-3xl shadow-lg transition-transform hover:scale-[1.01] relative overflow-hidden">
                                <div class="absolute inset-0 md:hidden bg-cover bg-center" style="background-image: url(${hero.mobile})"></div>
                                <div class="absolute inset-0 hidden md:block bg-cover bg-center" style="background-image: url(${hero.desktop})"></div>
                            </div>
                        `;
                    } else {
                        // Legacy String Support (Color class or single URL)
                        const isUrl = hero.startsWith('http') || hero.startsWith('/');
                        const style = isUrl ? `style="background-image: url(${hero}); background-size: cover; background-position: center;"` : '';
                        const className = !isUrl ? hero : '';
                        heroHtml = `<div class="${className} h-48 md:h-64 rounded-3xl shadow-lg transition-transform hover:scale-[1.01] relative overflow-hidden" ${style}></div>`;
                    }
                }
                /* const isHeroUrl = state.pageContent.heroImage?.startsWith('http') || state.pageContent.heroImage?.startsWith('/');
                const heroStyle = isHeroUrl ? `style="background-image: url(${state.pageContent.heroImage}); background-size: cover; background-position: center;"` : '';
                const heroClass = !isHeroUrl ? state.pageContent.heroImage : '';
 */
                mainContent.innerHTML = `
                    <div class="p-4 pb-32 space-y-6 fade-in ${state.pageContent.isProfile ? 'h-full flex flex-col' : ''}">
                        ${!state.pageContent.isProfile ? `<header class="mb-6"><h1 class="text-2xl font-bold text-gray-900 dark:text-white">${state.pageContent.title}</h1></header>` : ''}
                        
                        ${heroHtml}

                        <div class="space-y-4 ${state.pageContent.isProfile ? 'flex-1 flex flex-col justify-center' : ''}">
                            ${(state.pageContent.sections || []).map(renderSection).join('')}
                        </div>
                    </div>
                `;
            }
            
            lucide.createIcons();
        }

        // --- INIT ---
        init();

    </script>
</body>
</html>
